name: Deploy documentation to GitHub Pages

# Renders the technical documentation (app + methodology guide, Quarto) and publishes it to GitHub Pages
# with a small landing page. Enable once in repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Render documentation
        run: |
          quarto render docs/app-technical-documentation.qmd
          quarto render docs/methodology-guide.qmd
          mkdir -p _site
          cp docs/app-technical-documentation.html _site/app-technical-documentation.html
          cp docs/methodology-guide.html _site/methodology-guide.html
          cp docs/pages-landing.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
