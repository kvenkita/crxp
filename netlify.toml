[build]
  command = "npm run build:full"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
